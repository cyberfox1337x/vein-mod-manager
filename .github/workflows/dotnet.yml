name: dotnet

on:
  push:
    branches:
      - main
      - dev
      - staging
      - "feature/**"
  pull_request:
    branches:
      - main
      - dev
      - staging

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore tests\VeinModManager.SmokeTests\VeinModManager.SmokeTests.csproj

      - name: Build
        run: dotnet build tests\VeinModManager.SmokeTests\VeinModManager.SmokeTests.csproj --no-restore

      - name: Smoke test
        run: dotnet run --no-build --project tests\VeinModManager.SmokeTests\VeinModManager.SmokeTests.csproj -- src\VeinModManager\ModTemplate\ItemAndContainerModifier
