name: dotnet

on:
  push:
    branches:
      - main
      - dev
      - staging
      - "feature/**"
  pull_request:
    branches:
      - main
      - dev
      - staging

  workflow_dispatch:

jobs:
  ci:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore VeinModManager.sln

      - name: Build
        run: dotnet build VeinModManager.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test VeinModManager.sln --configuration Release --no-build --verbosity normal

  release:
    if: github.event_name == 'workflow_dispatch'
    needs: ci
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish win-x64
        run: dotnet publish src\VeinModManager\VeinModManager.csproj --configuration Release --runtime win-x64 --self-contained true --output artifacts\VeinModManager-win-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VeinModManager-win-x64
          path: artifacts\VeinModManager-win-x64
